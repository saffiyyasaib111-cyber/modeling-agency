<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA // NAVIGATION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap');

        body {
            background-color: #050505;
            color: #fff;
            font-family: 'Cormorant Garamond', serif;
            margin: 0;
            /* Prevents weird scrolling on mobile while allowing content to fit */
            overflow-x: hidden;
            min-height: 100vh;
        }

        .heading-font { font-family: 'Syncopate', sans-serif; }

        /* FLUID CONTAINER: Adjusts padding based on screen height to prevent cutting */
        .menu-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 120px 8% 40px 8%;
            background: radial-gradient(circle at top right, rgba(0, 242, 255, 0.03), transparent);
        }

        /* MENU LINK: Uses clamp for perfect scaling without breaking lines */
        .menu-link {
            font-size: clamp(2.5rem, 10vh, 5.5rem);
            line-height: 1;
            font-weight: 300;
            text-transform: uppercase;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            cursor: pointer;
            width: fit-content;
            display: block;
        }

        .menu-link:hover {
            color: #00f2ff;
            transform: translateX(20px);
            font-style: italic;
        }

        /* Side Numbering - Hidden on mobile to save space */
        .menu-link::before {
            content: attr(data-number);
            position: absolute;
            left: -50px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.7rem;
            font-family: 'Syncopate', sans-serif;
            opacity: 0.3;
        }

        /* FOOTER DATA: Stacks vertically on mobile, horizontal on laptop */
        .footer-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 2rem;
            margin-top: 2rem;
        }

        @media (min-width: 768px) {
            .footer-grid { grid-template-columns: 1.5fr 1fr 1fr; }
        }

        /* Animation for a premium feel */
        .reveal {
            animation: revealEffect 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes revealEffect {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- NAVIGATION HEADER -->
    <header class="fixed top-0 w-full z-50 p-6 md:p-10 flex justify-between items-center bg-black/20 backdrop-blur-md">
        <a href="aura.html" class="heading-font text-lg md:text-xl font-black tracking-tighter italic">AURA<span class="text-cyan-500">.</span></a>
        <a href="aura.html" class="group flex items-center space-x-3">
            <span class="text-[9px] font-bold tracking-[0.4em] uppercase opacity-40 group-hover:opacity-100 transition-opacity">Return</span>
            <div class="p-2 border border-white/10 rounded-full group-hover:bg-cyan-500 group-hover:text-black transition-all">
                <i data-lucide="arrow-left" class="w-4 h-4"></i>
            </div>
        </a>
    </header>

    <div class="menu-container">
        <!-- NAVIGATION LINKS -->
        <nav class="space-y-2 md:space-y-4">
            <div><a href="#" class="menu-link reveal" data-number="01" style="animation-delay: 0.1s;">Portfolios</a></div>
            <div><a href="#" class="menu-link reveal" data-number="02" style="animation-delay: 0.2s;">Discovery</a></div>
            <div><a href="#" class="menu-link reveal" data-number="03" style="animation-delay: 0.3s;">Campaigns</a></div>
            <div><a href="#" class="menu-link reveal" data-number="04" style="animation-delay: 0.4s;">Connect</a></div>
            <div><a href="#" class="menu-link reveal" data-number="05" style="animation-delay: 0.5s;">Archive</a></div>
        </nav>

        <!-- FOOTER INFO -->
        <div class="footer-grid reveal" style="animation-delay: 0.6s;">
            <!-- Contact -->
            <div class="space-y-2">
                <p class="heading-font text-[9px] tracking-[0.3em] text-cyan-400 uppercase">Enquiries</p>
                <p class="text-lg md:text-2xl font-light">agency@aura.digital</p>
                <p class="text-white/30 text-xs italic tracking-wide">+27 (0) 11 946 0123</p>
            </div>

            <!-- Hubs -->
            <div class="space-y-2">
                <p class="heading-font text-[9px] tracking-[0.3em] text-white/30 uppercase">Global Presence</p>
                <p class="text-xs md:text-sm tracking-widest uppercase leading-loose">Seoul / NYC / London / Johannesburg</p>
            </div>

            <!-- Social -->
            <div class="space-y-3">
                <p class="heading-font text-[9px] tracking-[0.3em] text-white/30 uppercase">Follow</p>
                <div class="flex space-x-6 text-white/50">
                    <a href="#" class="hover:text-cyan-400"><i data-lucide="instagram" class="w-5 h-5"></i></a>
                    <a href="#" class="hover:text-cyan-400"><i data-lucide="framer" class="w-5 h-5"></i></a>
                    <a href="#" class="hover:text-cyan-400"><i data-lucide="linkedin" class="w-5 h-5"></i></a>
                </div>
            </div>
        </div>
    </div>

    <!-- SUBTLE GRAIN OVERLAY -->
    <div class="fixed inset-0 pointer-events-none opacity-[0.04] bg-[url('https://i.imgur.com/vHqB37w.png')] z-[-1]"></div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
