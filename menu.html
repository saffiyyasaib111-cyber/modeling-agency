<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AURA // NAVIGATION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #fff;
            font-family: 'Cormorant Garamond', serif;
            overflow: hidden; 
            height: 100%;
            width: 100%;
        }

        .heading-font { font-family: 'Syncopate', sans-serif; }

        /* THE FIX: Increased top padding to 15vh ensures the first link clears the header */
        .menu-wrapper {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-around; /* Distributes space more evenly */
            padding: 15vh 8% 5vh 8%; 
            box-sizing: border-box;
            background: radial-gradient(circle at top right, rgba(0, 242, 255, 0.03), transparent);
        }

        .nav-links-area {
            display: flex;
            flex-direction: column;
            gap: 1.5vh;
        }

        .menu-link {
            font-size: clamp(1.8rem, 6vh, 4rem); 
            line-height: 1.1;
            font-weight: 300;
            text-transform: uppercase;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            color: white;
            text-decoration: none;
            display: inline-block;
            white-space: nowrap;
        }

        .menu-link:hover {
            color: #00f2ff;
            transform: translateX(10px);
            font-style: italic;
        }

        .footer-section {
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 3vh;
            display: grid;
            grid-template-columns: 1fr;
            gap: 2vh;
        }

        @media (min-width: 1024px) {
            .footer-section {
                grid-template-columns: 1.5fr 1fr 1fr;
            }
        }

        /* Animations */
        .reveal {
            animation: revealEffect 1s ease forwards;
            opacity: 0;
            transform: translateY(15px);
        }

        @keyframes revealEffect {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header class="absolute top-0 w-full z-50 p-6 md:p-10 flex justify-between items-center">
        <a href="index.html" class="heading-font text-lg md:text-xl font-black italic tracking-tighter">AURA<span class="text-cyan-500">.</span></a>
        <a href="index.html" class="flex items-center space-x-3 group">
            <span class="text-[8px] font-bold tracking-[0.3em] uppercase opacity-40 group-hover:opacity-100 transition-opacity">Close</span>
            <div class="p-2 border border-white/10 rounded-full group-hover:bg-white group-hover:text-black transition-all">
                <i data-lucide="x" class="w-4 h-4"></i>
            </div>
        </a>
    </header>

    <div class="menu-wrapper">
        <nav class="nav-links-area">
            <div><a href="portfolios.html" class="menu-link reveal" style="animation-delay: 0.1s;">Portfolios</a></div>
            <div><a href="discovery.html" class="menu-link reveal" style="animation-delay: 0.2s;">Discovery</a></div>
            <div><a href="campaigns.html" class="menu-link reveal" style="animation-delay: 0.3s;">Campaigns</a></div>
            <div><a href="contact.html" class="menu-link reveal" style="animation-delay: 0.4s;">Connect</a></div>
        </nav>

        <div class="footer-section reveal" style="animation-delay: 0.5s;">
            <div class="space-y-1">
                <p class="heading-font text-[8px] tracking-[0.2em] text-cyan-400 uppercase">Direct</p>
                <p class="text-lg md:text-xl font-light tracking-tight">saffiyyasaib111@gmail.com</p>
            </div>

            <div class="flex items-center md:justify-end space-x-6">
                <a href="#" class="text-white/40 hover:text-cyan-400 transition-colors"><i data-lucide="instagram" class="w-5 h-5"></i></a>
                <a href="#" class="text-white/40 hover:text-cyan-400 transition-colors"><i data-lucide="linkedin" class="w-5 h-5"></i></a>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        document.querySelectorAll('.menu-link').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                const target = this.getAttribute('href');
                document.querySelector('.menu-wrapper').style.opacity = '0';
                document.querySelector('.menu-wrapper').style.transition = 'opacity 0.4s';
                setTimeout(() => { window.location.href = target; }, 400);
            });
        });
    </script>
</body>
</html>
