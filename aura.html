<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA // 2026 DIGITAL AVANT-GARDE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap');

        :root {
            --neon-blue: #00f2ff;
            --deep-black: #050505;
        }

        body {
            background-color: var(--deep-black);
            color: #fff;
            font-family: 'Cormorant Garamond', serif;
            overflow-x: hidden;
            width: 100vw;
        }

        .heading-font { font-family: 'Syncopate', sans-serif; }

        .glass-navbar {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .nav-link {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.5);
            transition: all 0.4s ease;
        }

        .nav-link:hover {
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
        }

        /* SEARCH & CONTACT OVERLAYS */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(5, 5, 5, 0.98);
            backdrop-filter: blur(30px);
            z-index: 200;
            display: none;
            opacity: 0;
            transition: all 0.4s ease;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .search-input {
            background: transparent;
            border: none;
            border-bottom: 2px solid rgba(0, 242, 255, 0.3);
            font-size: clamp(1.5rem, 5vw, 3rem);
            width: 100%;
            max-width: 800px;
            color: white;
            outline: none;
            text-align: center;
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
        }

        /* MODEL ANIMATION */
        .model-stage {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            pointer-events: none;
        }

        .rotating-model-wrap {
            width: 70vw;
            height: 50vh;
            max-width: 400px;
            position: relative;
            transform-style: preserve-3d;
            animation: floating 8s ease-in-out infinite;
        }

        .model-motion {
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, var(--neon-blue), #7000ff);
            clip-path: polygon(50% 0%, 80% 10%, 90% 35%, 70% 45%, 85% 70%, 75% 100%, 25% 100%, 15% 70%, 30% 45%, 10% 35%, 20% 10%);
            filter: blur(2px) drop-shadow(0 0 20px var(--neon-blue));
            opacity: 0.6;
            animation: morphRotation 10s linear infinite;
        }

        @keyframes morphRotation {
            0% { transform: rotateY(0deg); filter: hue-rotate(0deg); }
            100% { transform: rotateY(360deg); filter: hue-rotate(360deg); }
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .hero-grid {
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.03) 1px, transparent 0);
            background-size: 40px 40px;
        }

        /* MOBILE FIXES */
        @media (max-width: 768px) {
            .hero-title { font-size: 15vw !important; opacity: 0.05; }
            .model-stage { top: -10%; }
            .nav-hide-mobile { display: none; }
        }
    </style>
</head>
<body class="h-screen relative hero-grid overflow-hidden">

    <!-- SEARCH OVERLAY -->
    <div id="search-overlay" class="overlay">
        <button onclick="toggleUI('search-overlay')" class="absolute top-8 right-8 text-white/40 hover:text-white">
            <i data-lucide="x" class="w-8 h-8"></i>
        </button>
        <div class="w-full max-w-4xl text-center space-y-6">
            <p class="heading-font text-[9px] tracking-[1em] text-cyan-400 uppercase">Aura Search Engine</p>
            <input type="text" class="search-input" placeholder="Search talent, cities, or labs..." autofocus>
        </div>
    </div>

    <!-- CONTACT OVERLAY -->
    <div id="contact-overlay" class="overlay">
        <button onclick="toggleUI('contact-overlay')" class="absolute top-8 right-8 text-white/40 hover:text-white">
            <i data-lucide="x" class="w-8 h-8"></i>
        </button>
        <div class="text-center">
            <h2 class="heading-font text-[10px] tracking-[1em] text-cyan-400 uppercase mb-8">Direct Comms</h2>
            <p class="text-4xl md:text-6xl italic mb-4">hello@aura-agency.com</p>
            <p class="text-white/40 text-lg">Inquiries regarding 2026 digital architecture.</p>
        </div>
    </div>

    <!-- NAVBAR -->
    <nav class="fixed top-0 w-full z-[100] glass-navbar">
        <div class="max-w-screen-2xl mx-auto px-6 h-20 flex justify-between items-center">
            <a href="#" class="heading-font text-xl font-black italic">AURA<span class="text-cyan-500">.</span></a>

            <div class="nav-hide-mobile flex items-center space-x-10">
                <a href="portfolios.html" class="nav-link">Portfolios</a>
                <a href="discovery.html" class="nav-link">Discovery</a>
                <a href="apply.html" class="nav-link">Apply</a>
                <button onclick="toggleUI('contact-overlay')" class="nav-link text-cyan-400">Contact</button>
            </div>

            <div class="flex items-center space-x-4">
                <button onclick="toggleUI('search-overlay')" class="p-2 text-white/40 hover:text-cyan-400 transition-all">
                    <i data-lucide="search" class="w-5 h-5"></i>
                </button>
                <a href="menu.html" class="flex items-center space-x-2 bg-white/5 border border-white/10 px-4 py-2 rounded">
                    <span class="heading-font text-[9px] tracking-widest uppercase">Menu</span>
                    <i data-lucide="menu" class="w-4 h-4 text-cyan-400"></i>
                </a>
            </div>
        </div>
    </nav>

    <!-- MAIN STAGE -->
    <main class="relative h-full flex flex-col items-center justify-center pt-20">
        <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
            <h1 class="hero-title text-[12vw] font-light italic opacity-10 select-none whitespace-nowrap"></h1>
        </div>

        <div class="model-stage">
            <div class="rotating-model-wrap" id="mouse-box">
                <div class="model-motion"></div>
                <div class="absolute inset-0 bg-cyan-500/10 blur-[100px] -z-10"></div>
            </div>
        </div>

        <div class="z-20 text-center px-6">
            <h2 class="heading-font text-[9px] md:text-xs tracking-[1em] text-cyan-400 uppercase mb-4">Established 2026</h2>
            <h1 class="text-4xl md:text-8xl font-light leading-none max-w-5xl mb-10">The Future of <span class="italic font-semibold">Talent</span> Architecture</h1>
            
            <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
                <a href="portfolios.html" class="bg-white text-black px-10 py-4 text-[9px] font-black uppercase tracking-widest hover:bg-cyan-500 transition-all w-full sm:w-auto text-center">Enter Portfolio</a>
                <a href="apply.html" class="text-white border border-white/10 px-10 py-4 text-[9px] font-black uppercase tracking-widest hover:bg-white/5 transition-all w-full sm:w-auto text-center">Apply Now</a>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="fixed bottom-0 w-full p-6 md:p-10 flex justify-between items-end z-50">
        <div class="hidden md:block">
            <div class="text-[8px] font-mono text-white/30 mb-1 tracking-widest">AURA_OS v4.0.2</div>
            <div class="text-[10px] tracking-[0.4em] uppercase text-white/50">Secure Connection Established by Saffiyya Saib</div>
        </div>
        <div class="flex space-x-6">
            <i data-lucide="instagram" class="w-4 h-4 text-white/30 hover:text-cyan-400 cursor-pointer"></i>
            <i data-lucide="twitter" class="w-4 h-4 text-white/30 hover:text-cyan-400 cursor-pointer"></i>
        </div>
    </footer>

    <script>
        lucide.createIcons();

        // UI TOGGLES
        function toggleUI(id) {
            const el = document.getElementById(id);
            if (el.style.display === 'flex') {
                el.style.opacity = '0';
                setTimeout(() => el.style.display = 'none', 400);
                document.body.style.overflow = 'auto';
            } else {
                el.style.display = 'flex';
                setTimeout(() => {
                    el.style.opacity = '1';
                    if(id === 'search-overlay') el.querySelector('input').focus();
                }, 10);
                document.body.style.overflow = 'hidden';
            }
        }

        // MOUSE MOTION
        const box = document.getElementById('mouse-box');
        const handleMotion = (clientX, clientY) => {
            const x = (window.innerWidth / 2 - clientX) / 35;
            const y = (window.innerHeight / 2 - clientY) / 35;
            box.style.transform = `rotateY(${-x}deg) rotateX(${y}deg)`;
        };

        document.addEventListener('mousemove', (e) => handleMotion(e.pageX, e.pageY));
        document.addEventListener('touchmove', (e) => handleMotion(e.touches[0].clientX, e.touches[0].clientY));
    </script>
</body>
</html>
